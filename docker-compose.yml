services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host # Permite resolver DNS durante el build (evita EAI_AGAIN)
      args:
        DNS: 8.8.8.8
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    stdin_open: true
    tty: true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP:-localhost}

  seed:
    build:
      context: .
      dockerfile: backend/firebase_seed/Dockerfile
    working_dir: /workspace/backend/firebase_seed
    volumes:
      - .:/workspace
    tty: true
